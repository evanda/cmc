<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMC — Campus indoor map preview</title>
<!-- Vendored locally so the demo runs with no CDN / API key for the library. -->
<link href="./vendor/maplibre-gl.css" rel="stylesheet" />
<script src="./vendor/maplibre-gl.js"></script>
<style>
  html, body, #map { margin: 0; height: 100%; }
  body { font: 14px/1.4 system-ui, sans-serif; }
  #levels {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.25);
    padding: 6px; display: flex; flex-direction: column; gap: 4px; width: 92px;
  }
  #levels button {
    border: 0; border-radius: 7px; padding: 8px 10px; cursor: pointer;
    background: #f1f5f9; color: #0f172a; font-weight: 600; text-align: left;
  }
  #levels button.active { background: #2563eb; color: #fff; }
  #legend {
    position: absolute; bottom: 12px; left: 12px; z-index: 2; background: #fff;
    border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.25); padding: 10px 12px;
    max-height: 60vh; overflow: auto;
  }
  #legend .hd { font-weight: 700; margin: 6px 0 3px; }
  #legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  #legend .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #0003; }
  #legend .sq { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #0006; }
  #title {
    position: absolute; top: 12px; right: 12px; z-index: 2; background: #fff;
    border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.25); padding: 8px 12px;
    max-width: 240px;
  }
  #title b { display: block; }
  #title small { color: #475569; }
  .poi { transform: translate(-50%, -50%); text-align: center; cursor: pointer; }
  .poi .dot {
    width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff;
    margin: 0 auto; box-shadow: 0 0 0 1px #0006;
  }
  .poi .lbl, .bname, .aname {
    font-weight: 600; color: #f8fafc;
    text-shadow: 0 0 3px #000, 0 0 3px #000, 0 0 3px #000; white-space: nowrap;
  }
  .poi .lbl { margin-top: 2px; font-size: 11px; }
  .bname { transform: translate(-50%, -50%); font-size: 13px; font-weight: 700; text-align: center; pointer-events: none; }
  .aname { transform: translate(-50%, -50%); font-size: 11px; font-style: italic; pointer-events: none; }
  .maplibregl-popup-content { max-width: 260px; }
  .maplibregl-popup-content h3 { margin: 0 0 4px; font-size: 14px; }
  .maplibregl-popup-content .meta { color: #475569; font-size: 12px; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="levels"></div>
<div id="legend"></div>
<div id="title"><b id="t-name">Campus indoor map</b><small id="t-sub">loading…</small></div>

<script>
// ── styling vocabularies (extend freely — adding a type is one line) ──────────
const KIND_COLORS = {  // HVAC unit family (poi_type === 'hvac'), by name prefix
  air_conditioner: '#2563eb', heat_pump: '#16a34a', air_handler: '#9333ea',
  packaged_unit: '#ea580c', wall_unit: '#0891b2', boiler: '#dc2626',
};
const KIND_LABELS = {
  air_conditioner: 'AC — air conditioner', heat_pump: 'HP — heat pump',
  air_handler: 'AH — air handler', packaged_unit: 'BG/BGF — packaged unit',
  wall_unit: 'WU — wall unit', boiler: 'Boiler',
};
const POI_TYPE_COLORS = {  // any non-HVAC point feature (plan §5.4 vocabulary)
  shutoff: '#facc15', door_controller: '#f472b6', network_hardware: '#38bdf8',
  sound_system: '#a78bfa', fountain: '#22d3ee', fire_extinguisher: '#ef4444',
  building: '#94a3b8', area: '#64748b',
};
const AREA_COLORS = {  // exterior area polygons (areas.geojson, by feature_type)
  playground: '#f59e0b', cemetery: '#94a3b8', garden: '#22c55e',
  carport: '#38bdf8', parking: '#64748b', field: '#84cc16', pavilion: '#fb923c',
};

const LEVELS = [
  { id: 'site', label: 'Site', level: null },
  { id: 'up',   label: '2 · Upper', level: 2 },
  { id: 'main', label: '1 · Main', level: 1 },
  { id: 'b1',   label: 'B1 · Lower', level: -1 },
];

const facility = new URLSearchParams(location.search).get('facility') || 'midwaypca';
const FDIR = `./facilities/${facility}`;

const ESRI = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
// Dark fallback layer renders even if the basemap tiles are unreachable. The
// satellite source itself is added in load() once meta.json is known — so a
// facility can point at a LOCAL, checked-in tile cache instead of live Esri.
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8, sources: {},
    layers: [{ id: 'bg', type: 'background', paint: { 'background-color': '#0b1220' } }],
  },
  center: [-84.6878, 33.9437], zoom: 17,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

let poiMarkers = [];

const getJSON = (url) => fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
const poiColor = (p) => p.poi_type === 'hvac'
  ? (KIND_COLORS[p.kind] || '#64748b')
  : (POI_TYPE_COLORS[p.poi_type] || '#64748b');

async function load() {
  const [meta, buildings, pois, areas] = await Promise.all([
    getJSON(`${FDIR}/meta.json`),
    getJSON(`${FDIR}/buildings.geojson`),
    getJSON(`${FDIR}/pois.geojson`),
    getJSON(`${FDIR}/areas.geojson`),       // optional
  ]);
  document.getElementById('t-name').textContent = (meta && meta.name) || facility;
  document.getElementById('t-sub').textContent =
    'Buildings traced on satellite (real coords). Points auto-placed per floor — nudge to exact spots.';

  // Basemap: a local checked-in tile cache (meta.basemap_tiles) if present,
  // else live Esri imagery. Relative templates resolve against the facility dir.
  const bt = meta && meta.basemap_tiles;
  const tilesUrl = bt ? (bt.startsWith('http') ? bt : `${FDIR}/${bt}`) : ESRI;
  map.addSource('satellite', {
    type: 'raster', tileSize: 256, tiles: [tilesUrl],
    minzoom: (meta && meta.basemap_minzoom) || 0,
    maxzoom: (meta && meta.basemap_maxzoom) || 19,
    attribution: (meta && meta.basemap_attribution) || 'Imagery © Esri, Maxar, Earthstar Geographics',
  });
  map.addLayer({ id: 'satellite', type: 'raster', source: 'satellite' });

  const bounds = new maplibregl.LngLatBounds();

  // exterior area polygons (playground, cemetery, garden, carport, …)
  if (areas && areas.features.length) {
    map.addSource('areas', { type: 'geojson', data: areas });
    map.addLayer({ id: 'area-fill', type: 'fill', source: 'areas',
      paint: { 'fill-color': areaColorExpr(), 'fill-opacity': 0.35 } });
    map.addLayer({ id: 'area-line', type: 'line', source: 'areas',
      paint: { 'line-color': areaColorExpr(), 'line-width': 1.5, 'line-dasharray': [2, 1] } });
    areas.features.forEach(f => {
      f.geometry.coordinates[0].forEach(c => bounds.extend(c));
      const c = ringCenter(f.geometry.coordinates[0]);
      const el = document.createElement('div'); el.className = 'aname'; el.textContent = f.properties.name || f.properties.feature_type;
      new maplibregl.Marker({ element: el }).setLngLat(c).addTo(map);
    });
  }

  // building footprints
  if (buildings) {
    map.addSource('buildings', { type: 'geojson', data: buildings });
    map.addLayer({ id: 'bldg-fill', type: 'fill', source: 'buildings',
      paint: { 'fill-color': '#1e293b', 'fill-opacity': 0.25 } });
    map.addLayer({ id: 'bldg-line', type: 'line', source: 'buildings',
      paint: { 'line-color': '#e2e8f0', 'line-width': 2 } });
    buildings.features.forEach(f => {
      f.geometry.coordinates[0].forEach(c => bounds.extend(c));
      const c = f.properties.label_lnglat || ringCenter(f.geometry.coordinates[0]);
      const el = document.createElement('div'); el.className = 'bname'; el.textContent = f.properties.name;
      new maplibregl.Marker({ element: el }).setLngLat(c).addTo(map);
    });
  }

  // POIs (HVAC + any other point feature)
  if (pois) {
    pois.features.forEach(f => {
      const p = f.properties;
      bounds.extend(f.geometry.coordinates);
      const el = document.createElement('div'); el.className = 'poi';
      el.innerHTML = `<div class="dot" style="background:${poiColor(p)}"></div><div class="lbl">${p.label}</div>`;
      const where = [p.building, p.level_name].filter(Boolean).join(' · ');
      const kindTxt = p.poi_type === 'hvac' ? (KIND_LABELS[p.kind] || p.kind) : p.poi_type;
      const popup = new maplibregl.Popup({ offset: 14 }).setHTML(
        `<h3>${p.label}</h3><div class="meta">${[where, kindTxt].filter(Boolean).join(' · ')}</div><div>${p.notes || ''}</div>`);
      const m = new maplibregl.Marker({ element: el }).setLngLat(f.geometry.coordinates).setPopup(popup).addTo(map);
      poiMarkers.push({ marker: m, level: p.level });
    });
  }

  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 90, duration: 0 });
  buildLevelSwitcher(); buildLegend(pois, areas); applyLevel(1, 'main');
}

const areaColorExpr = () => ['match', ['get', 'feature_type'],
  ...Object.entries(AREA_COLORS).flatMap(([k, c]) => [k, c]), '#64748b'];
function ringCenter(ring) {
  const xs = ring.map(p => p[0]), ys = ring.map(p => p[1]);
  return [(Math.min(...xs) + Math.max(...xs)) / 2, (Math.min(...ys) + Math.max(...ys)) / 2];
}
function applyLevel(level, id) {
  poiMarkers.forEach(({ marker, level: l }) =>
    marker.getElement().style.display = (level !== null && l === level) ? '' : 'none');
  document.querySelectorAll('#levels button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
}
function buildLevelSwitcher() {
  const el = document.getElementById('levels');
  LEVELS.forEach(l => {
    const b = document.createElement('button');
    b.textContent = l.label; b.dataset.id = l.id;
    b.onclick = () => applyLevel(l.level, l.id);
    el.appendChild(b);
  });
}
function buildLegend(pois, areas) {
  const el = document.getElementById('legend');
  let html = '<div class="hd">HVAC units</div>' +
    Object.entries(KIND_LABELS).map(([k, label]) =>
      `<div class="row"><span class="dot" style="background:${KIND_COLORS[k]}"></span>${label}</div>`).join('');
  // other point feature types actually present
  const otherTypes = [...new Set((pois ? pois.features : []).map(f => f.properties.poi_type).filter(t => t !== 'hvac'))];
  if (otherTypes.length) html += '<div class="hd">Features</div>' + otherTypes.map(t =>
    `<div class="row"><span class="dot" style="background:${POI_TYPE_COLORS[t] || '#64748b'}"></span>${t}</div>`).join('');
  const areaTypes = [...new Set((areas ? areas.features : []).map(f => f.properties.feature_type))];
  if (areaTypes.length) html += '<div class="hd">Areas</div>' + areaTypes.map(t =>
    `<div class="row"><span class="sq" style="background:${AREA_COLORS[t] || '#64748b'}"></span>${t}</div>`).join('');
  el.innerHTML = html;
}

map.on('load', load);
</script>
</body>
</html>
