# Supabase CLI config (https://supabase.com/docs/guides/local-development).
# Single-tenant per deployment: each church links this to its own project ref
# via `supabase link`. The local stack (`supabase start`) needs Docker.
project_id = "cmc"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173", "http://127.0.0.1:5173/accept-invite", "http://localhost:5173/accept-invite"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Branded invite email (issue #56). The default Supabase invite says nothing
# about the app, facility, or inviter; this template renders all three from the
# invitee's metadata (set by the invite-user edge function). Apply to hosted
# with `supabase config push` (or paste the rendered template into the
# dashboard's Auth → Email Templates → Invite user).
[auth.email.template.invite]
subject = "You're invited to {{ .Data.facility_name }} on CMC"
content_path = "./supabase/templates/invite.html"
